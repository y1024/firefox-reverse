# Firefox-Reverse · 自动编译 + 发布到 Releases
#
# 触发：打 tag（v* 形如 v0.17.0）自动跑；也可手动 workflow_dispatch。
#
# 主路径 = 自托管 runner（标签 self-hosted）：复用编译机上已有的 Firefox 源码树，
#   分别使用独立对象目录增量构建 macOS arm64 / x86_64 DMG，再上传 Release。
#   增量构建几十秒级，远比 GitHub 托管从零编译靠谱。
#
# 可选路径 = GitHub 托管的 Windows/Linux 从零编译：手动 workflow_dispatch 且勾 build_all=true 才跑，
#   很重、且 Windows 的 C++ 补丁未在 MSVC 验证——属实验性，失败不阻塞 mac 发布。

name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      build_all:
        description: "同时尝试 GitHub 托管的 Windows/Linux 从零编译（实验性、很慢）"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  # ── 1. 建 Release（草稿）──
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - id: meta
        run: echo "tag=${GITHUB_REF_NAME:-manual-$(date +%Y%m%d%H%M)}" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          draft: true
          name: "Firefox-Reverse ${{ steps.meta.outputs.tag }}"
          body: |
            Firefox-Reverse ${{ steps.meta.outputs.tag }} —— 内置 AI 逆向 Agent 的 Firefox。
            按系统下载安装包，使用说明见 README。

  # ── 2. 自托管 runner：增量构建 macOS arm64 / Intel DMG → 传 Release ──
  build-mac:
    needs: create-release
    runs-on: self-hosted
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - arch: arm64
            asset_arch: arm64
            mozconfig: mozconfig.mac
            objdir: obj-aarch64-apple-darwin
            file_marker: arm64
          - arch: x86_64
            asset_arch: x86_64
            mozconfig: configs/mozconfig.macos-x64
            objdir: obj-x86_64-apple-darwin
            file_marker: x86_64
    env:
      UPSTREAM: /home/ubuntu/firefox-reverse/upstream
    steps:
      - name: Checkout 补丁集
        uses: actions/checkout@v4

      - name: 构建侧栏前端 bundle（bundle 是构建产物、未入库，CI 现编）
        working-directory: additions/browser/components/agent-sidebar
        run: |
          set -e
          npm ci || npm install
          npm run build
          test -f content/agent-sidebar.bundle.js   # 确保产物存在，否则后面 jar 打包会失败

      - name: 同步全部 additions 到源码树（复用已 bootstrap 的树，增量编）
        run: |
          set -e
          rsync -a \
            --exclude node_modules --exclude dev --exclude README.md \
            --exclude '*.jsx' --exclude 'package*.json' --exclude .gitignore \
            "$GITHUB_WORKSPACE/additions/" "$UPSTREAM/"
          node "$GITHUB_WORKSPACE/scripts/check-branding-assets.mjs" "$UPSTREAM"

      - name: mach build + package（${{ matrix.arch }}）
        working-directory: ${{ env.UPSTREAM }}
        run: |
          set -e
          if [[ "${{ matrix.mozconfig }}" = configs/* ]]; then
            export MOZCONFIG="$GITHUB_WORKSPACE/${{ matrix.mozconfig }}"
          else
            export MOZCONFIG="${{ matrix.mozconfig }}"
          fi
          export MOZ_BUILD_DATE="$(date -u +%Y%m%d%H%M%S)"
          rm -f "${{ matrix.objdir }}/buildid.h"
          ./mach build
          "$GITHUB_WORKSPACE/scripts/macos-adhoc-sign-apps.sh" "$UPSTREAM"
          ./mach package

      - name: 校验目标架构并整理 DMG
        id: dmg
        run: |
          set -e
          obj="$UPSTREAM/${{ matrix.objdir }}"
          executable=$(find "$obj/dist/firefox" -path '*/Contents/MacOS/firefox' -type f | head -1)
          test -n "$executable"
          file "$executable" | grep -F '${{ matrix.file_marker }}'
          source_dmg=$(ls "$obj"/dist/firefox-*.mac.dmg | head -1)
          output="$GITHUB_WORKSPACE/firefox-reverse-${{ needs.create-release.outputs.tag }}-macos-${{ matrix.asset_arch }}.dmg"
          cp "$source_dmg" "$output"
          echo "path=$output" >> "$GITHUB_OUTPUT"
          echo "dmg: $output"

      - name: 校验 dmg 内 app 签名
        if: steps.dmg.outputs.path != ''
        run: |
          "$GITHUB_WORKSPACE/scripts/macos-verify-dmg.sh" --arch "${{ matrix.arch }}" "${{ steps.dmg.outputs.path }}"

      - name: 上传 dmg 到 Release
        if: steps.dmg.outputs.path != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: ${{ steps.dmg.outputs.path }}

  # ── 3.（可选·实验性）GitHub 托管：Windows / Linux 从零编译 ──
  # 仅当手动触发且 build_all=true 才跑。很重、Windows 未验证，失败不影响 mac 发布。
  build-others:
    needs: create-release
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_all }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win64
            pkg_glob: "obj-*/dist/install/**/firefox-*.zip"
          - os: ubuntu-latest
            target: linux-x86_64
            pkg_glob: "obj-*/dist/firefox-*.tar.*"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 350
    env:
      GECKO_REMOTE: "https://github.com/mozilla/gecko-dev.git"
      FIREFOX_REV: ${{ vars.FIREFOX_REV || 'main' }}
    steps:
      - uses: actions/checkout@v4
        with: { path: firefox-reverse }
      - name: 取 Firefox 源码
        shell: bash
        run: git clone --depth 1 --branch "$FIREFOX_REV" "$GECKO_REMOTE" upstream || git clone --depth 1 "$GECKO_REMOTE" upstream
      - name: 应用 additions
        shell: bash
        run: |
          rsync -a --exclude node_modules --exclude README.md firefox-reverse/additions/ upstream/ || cp -R firefox-reverse/additions/* upstream/
          [ -f firefox-reverse/scripts/apply-patches.sh ] && ( cd firefox-reverse && bash scripts/apply-patches.sh ) || true
          node firefox-reverse/scripts/check-branding-assets.mjs upstream
      - name: bootstrap + build + package
        shell: bash
        working-directory: upstream
        run: |
          ./mach --no-interactive bootstrap --application-choice browser
          ./mach build
          ./mach package
      - name: 收集 + 上传
        shell: bash
        run: |
          f=$(ls upstream/${{ matrix.pkg_glob }} 2>/dev/null | head -1)
          [ -n "$f" ] && gh release upload "${{ needs.create-release.outputs.tag }}" "$f" --clobber || echo "no artifact"
        env:
          GH_TOKEN: ${{ github.token }}
